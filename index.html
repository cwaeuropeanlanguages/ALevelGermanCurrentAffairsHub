<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A-Level German Current Affairs Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero__inner">
      <p class="eyebrow">AQA A-Level German</p>
      <h1>A-Level German Current Affairs Hub</h1>
      <p class="hero__text">
        Read recent German-language articles linked to the specification, sorted by theme and sub-topic.
      </p>
      <div class="hero__actions">
        <button id="randomArticleBtn" class="button button--primary">Random article</button>
        <button id="clearFiltersBtn" class="button button--ghost">Show all</button>
      </div>
      <p class="small-note" id="lastUpdated">Loading latest articles…</p>
    </div>
  </header>

  <main class="page">
    <section class="panel">
      <div class="panel__header">
        <div>
          <h2>Themes</h2>
          <p>Choose a specification area.</p>
        </div>
      </div>
      <div id="themeGrid" class="theme-grid"></div>
    </section>

    <section class="panel">
      <div class="panel__header stack-mobile">
        <div>
          <h2>Sub-topics</h2>
          <p>Refine the articles shown below.</p>
        </div>
        <div id="subtopicChips" class="chips"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel__header stack-mobile">
        <div>
          <h2>Articles</h2>
          <p id="resultsLabel">Loading…</p>
        </div>
      </div>
      <div id="articlesList" class="article-list"></div>
    </section>
  </main>

  <dialog id="articleDialog" class="dialog">
    <div class="dialog__content" id="dialogContent"></div>
    <form method="dialog" class="dialog__footer">
      <button class="button button--ghost">Close</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
