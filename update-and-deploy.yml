:root {
  --bg: #f5f7fb;
  --panel: #ffffff;
  --text: #162033;
  --muted: #5e6a80;
  --line: #dfe5ef;
  --brand: #4038c8;
  --brand-soft: #ecebff;
  --shadow: 0 10px 30px rgba(22, 32, 51, 0.08);
  --radius: 18px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 220px);
  color: var(--text);
}

button,
a {
  font: inherit;
}

.hero {
  padding: 28px 20px 8px;
}

.hero__inner,
.page {
  max-width: 1120px;
  margin: 0 auto;
}

.hero__inner {
  background: rgba(255, 255, 255, 0.88);
  border: 1px solid rgba(255, 255, 255, 0.9);
  box-shadow: var(--shadow);
  border-radius: 28px;
  padding: 28px;
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--brand);
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-size: 0.78rem;
}

h1 {
  margin: 0;
  font-size: clamp(2rem, 4vw, 3.2rem);
  line-height: 1.05;
}

.hero__text {
  max-width: 760px;
  color: var(--muted);
  font-size: 1.02rem;
  line-height: 1.6;
}

.hero__actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 18px;
}

.small-note {
  margin-top: 14px;
  color: var(--muted);
  font-size: 0.92rem;
}

.page {
  padding: 18px 20px 42px;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 22px;
  box-shadow: var(--shadow);
  margin-bottom: 18px;
}

.panel__header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 16px;
}

.panel__header h2 {
  margin: 0 0 6px;
}

.panel__header p {
  margin: 0;
  color: var(--muted);
}

.theme-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
}

.theme-card {
  padding: 18px;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: #fbfcff;
  cursor: pointer;
  text-align: left;
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
}

.theme-card:hover,
.theme-card:focus-visible {
  transform: translateY(-2px);
  border-color: #b8c4f7;
  box-shadow: 0 8px 20px rgba(64, 56, 200, 0.08);
}

.theme-card.is-active {
  border-color: var(--brand);
  background: var(--brand-soft);
}

.theme-card__short {
  margin: 0 0 8px;
  font-weight: 700;
  font-size: 1.1rem;
}

.theme-card__long {
  margin: 0;
  color: var(--muted);
  line-height: 1.45;
  font-size: 0.95rem;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.chip {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  border-radius: 999px;
  padding: 10px 14px;
  cursor: pointer;
}

.chip.is-active {
  border-color: var(--brand);
  background: var(--brand-soft);
  color: var(--brand);
  font-weight: 700;
}

.article-list {
  display: grid;
  gap: 14px;
}

.article-card {
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 18px;
  background: #fff;
}

.article-card__top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.article-card h3 {
  margin: 0 0 10px;
  font-size: 1.15rem;
  line-height: 1.35;
}

.meta,
.tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.meta {
  margin-bottom: 10px;
}

.tag,
.meta-pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 0.84rem;
}

.meta-pill {
  background: #f1f4fa;
  color: #374255;
}

.tag {
  background: var(--brand-soft);
  color: var(--brand);
}

.article-card p {
  margin: 12px 0 0;
  line-height: 1.6;
  color: #243149;
}

.article-card__actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 14px;
}

.button {
  border: 1px solid transparent;
  border-radius: 12px;
  padding: 11px 15px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.button--primary {
  background: var(--brand);
  color: #fff;
}

.button--ghost {
  background: #fff;
  border-color: var(--line);
  color: var(--text);
}

.button--small {
  padding: 9px 12px;
  font-size: 0.92rem;
}

.empty-state {
  border: 1px dashed #cbd5e1;
  border-radius: 20px;
  padding: 24px;
  text-align: center;
  color: var(--muted);
  background: #fbfcff;
}

.dialog {
  width: min(840px, calc(100vw - 24px));
  border: none;
  border-radius: 24px;
  padding: 0;
  box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
}

.dialog::backdrop {
  background: rgba(15, 23, 42, 0.45);
}

.dialog__content {
  padding: 22px;
}

.dialog__footer {
  display: flex;
  justify-content: flex-end;
  padding: 0 22px 22px;
}

.dialog__section {
  border-top: 1px solid var(--line);
  padding-top: 16px;
  margin-top: 16px;
}

.dialog__section h4 {
  margin: 0 0 10px;
}

.dialog__section ul {
  margin: 0;
  padding-left: 20px;
  line-height: 1.7;
}

@media (max-width: 720px) {
  .hero__inner,
  .panel {
    padding: 18px;
    border-radius: 20px;
  }

  .stack-mobile {
    flex-direction: column;
  }

  .article-card__top {
    flex-direction: column;
  }
}
